services:
  media-service-mongodb:
    build: ./database
    container_name: media-service-mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: amine
      MONGO_INITDB_ROOT_PASSWORD: 1234
      MONGO_INITDB_DATABASE: DB
    volumes:
      - mongo_data:/data/db
    networks:
      - shared-net

  media-service:
    build:
      context: ../
      dockerfile: ./media-service/media/Dockerfile
    container_name: media-service
    ports:
      - "8888:8888"
    environment:
      SPRING_APPLICATION_NAME: media
      SPRING_DATA_MONGODB_URI: mongodb://amine:1234@media-service-mongodb:27017/DB?authSource=admin
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      DISCOVERY : http://eureka-server:8761/eureka
      JAVA_TOOL_OPTIONS: -Djavax.net.ssl.trustStore=/app/resources/certs/truststore.p12 -Djavax.net.ssl.trustStorePassword=123123 -Djavax.net.ssl.trustStoreType=PKCS12 -Djavax.net.ssl.keyStore=/app/resources/certs/users-service.p12 -Djavax.net.ssl.keyStorePassword=123123 -Djavax.net.ssl.keyStoreType=PKCS12

    depends_on:
      - media-service-mongodb
    volumes:
      - media_m2:/root/.m2
      - ./certs/media-service.p12:/app/resources/certs/media-service.p12:ro
      - ./certs/truststore.p12:/app/resources/certs/truststore.p12:ro
    networks:
      - shared-net

volumes:
  mongo_data:
  media_m2:

networks:
  shared-net:
    external: true
