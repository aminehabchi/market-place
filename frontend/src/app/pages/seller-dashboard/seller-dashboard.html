<div class="w-full px-4 md:px-8 lg:px-12 mt-6">
    <div class="mb-6 flex items-center justify-between p-4">
        <!-- Product Info -->
        <div>
            <span class="text-gray-700 font-medium">
                Total Products: {{ products.length }}
            </span>
        </div>

        <!-- Create Button -->
        <button
            class="px-5 py-2 bg-blue-600 text-white font-semibold rounded hover:bg-blue-700 transition cursor-pointer"
            (click)="togglePopUp()">
            Create </button>
    </div>


    <div class="container mx-auto p-4">
        <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
            <app-product *ngFor="let product of products" [product]="product" class="block w-full"></app-product>
        </div>
    </div>
</div>

<!-- Create Product Popup -->
<app-create-product-pop-pup *ngIf="isPopPupOpen" (closePopUp)="togglePopUp()"></app-create-product-pop-pup>
