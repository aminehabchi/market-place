<div class="fixed inset-0 bg-black/30 flex items-center justify-center z-50" (click)="close()">
  <!-- Modal -->
<div
  class="bg-white p-6 m-2 shadow-lg w-full max-w-md sm:max-w-lg md:max-w-xl lg:max-w-2xl xl:max-w-3xl"
  (click)="$event.stopPropagation()"
>

    <h2 class="text-xl font-semibold mb-4">Create Product</h2>
    <form (ngSubmit)="createProduct()" #productForm="ngForm">
      <!-- Product Name -->
      <div class="mb-4">
        <label class="block text-sm font-medium mb-1">Product Name</label>
        <input type="text" name="name" [(ngModel)]="product.name" required placeholder="Enter product name"
          class="w-full border px-3 py-2 focus:outline-none focus:ring focus:ring-blue-300" />
      </div>

      <!-- Description -->
      <div class="mb-4">
        <label class="block text-sm font-medium mb-1">Description</label>
        <textarea name="description" [(ngModel)]="product.description" required rows="3" placeholder="Enter product description"
          class="w-full border  px-3 py-2 focus:outline-none focus:ring focus:ring-blue-300"></textarea>
      </div>

      <!-- Price -->
      <div class="mb-4">
        <label class="block text-sm font-medium mb-1">Price</label>
        <input type="number" name="price" [(ngModel)]="product.price" required min="0" step="0.01" placeholder="Enter product price"
          class="w-full border px-3 py-2 focus:outline-none focus:ring focus:ring-blue-300" />
      </div>

      <!-- Single Image -->
      <div class="mb-4">
        <label class="block text-sm font-medium mb-1">Product Image</label>
        @if (!imagePreview()) {
        <label
          class="w-full h-48 flex flex-col items-center justify-center border-2 border-dashed border-gray-300 rounded cursor-pointer bg-gray-50 text-gray-400 text-center">
          <span>Click to upload an image</span>
          <input type="file" accept="image/*" (change)="onImageSelected($event)" class="hidden" />
        </label>
        }

        <!-- Preview -->
        @if (imagePreview()) {
        <div class="mt-3 relative">
          <img [src]="imagePreview()" class="w-full h-48 object-cover border" />

          <!-- Remove button -->
          <button type="button" (click)="removeImage()"
            class="absolute cursor-pointer top-1 right-1 bg-red-500 text-white text-xs px-1.5 py-0.5">
            ✕
          </button>
        </div>
        }
      </div>

      <!-- Buttons -->
      <div class="flex justify-end gap-3 mt-6">
        <button type="button" (click)="close()" class="px-4 py-2 cursor-pointer border hover:bg-gray-100">
          Close
        </button>

        <button type="submit" [disabled]="productForm.invalid || !imagePreview()"
          class="px-4 py-2 bg-blue-600 text-white cursor-pointer hover:bg-blue-700 disabled:opacity-50">
          Create
        </button>
      </div>
    </form>
  </div>
</div>
