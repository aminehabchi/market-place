<div class="max-w-sm rounded overflow-hidden shadow-lg bg-white">
  <!-- Product Image -->
  <div class="relative">
    <img class="w-full h-48 object-cover" [src]="imagePreview() || product.image" [alt]="product.name" />
    <!-- Edit button on image -->
    <button *ngIf="isEditing" class="absolute top-2 right-2 bg-white p-1 rounded shadow hover:bg-gray-100"
      (click)="fileInput.click()">
      <i class="fa fa-upload"></i>
    </button>
    <input type="file" #fileInput class="hidden" (change)="onImageSelected($event)" accept="image/*" />
  </div>

  <!-- Product Info -->
  <div class="px-6 py-4">
    <div *ngIf="!isEditing; else editTemplate">
      <div class="font-bold text-xl mb-2">{{ product.name }}</div>
      <p class="text-gray-700 text-base">{{ product.description }}</p>
      <p class="text-indigo-600 font-bold text-lg">${{ product.price }}</p>
    </div>

    <!-- Edit Mode -->
    <ng-template #editTemplate>
      <input type="text" [(ngModel)]="product.name" placeholder="Product Name" class="border rounded w-full p-2 mb-2" />
      <textarea [(ngModel)]="product.description" placeholder="Product Description"
        class="border rounded w-full p-2 mb-2"></textarea>
      <input type="number" [(ngModel)]="product.price" placeholder="Price" class="border rounded w-full p-2" />
    </ng-template>
  </div>

  <!-- Product Footer -->
  <div class="px-6 pt-4 pb-2 flex items-center justify-between">
    <div *ngIf="!isMyProduct">
      <button class="bg-indigo-600 text-white px-4 py-2 rounded hover:bg-indigo-500 transition duration-200">
        Buy
      </button>
    </div>

    <div *ngIf="isMyProduct" class="flex space-x-3 text-gray-600">
      <i *ngIf="!isEditing" (click)="isEditing = true"
        class="fa fa-pencil hover:text-blue-600 cursor-pointer transition duration-200"></i>
      <i *ngIf="isEditing" (click)="save()"
        class="fa fa-check hover:text-green-600 cursor-pointer transition duration-200"></i>
      <i *ngIf="!isEditing" (click)="delete()"
        class="fa fa-trash hover:text-red-600 cursor-pointer transition duration-200"></i>
    </div>
  </div>
</div>
