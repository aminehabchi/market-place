<div class="max-w-sm rounded overflow-hidden shadow-lg bg-white">
  <!-- Product Image -->
  <img class="w-full h-48 object-cover" [src]="product.image" [alt]="product.name" />

  <!-- Product Info -->
  <div class="px-6 py-4">
    <div class="font-bold text-xl mb-2">{{ product.name }}</div>
    <p class="text-gray-700 text-base">{{ product.description }}</p>
  </div>

  <!-- Product Footer -->
  <div class="px-6 pt-4 pb-2 flex items-center justify-between">
    <span class="text-indigo-600 font-bold text-lg">${{ product.price }}</span>
    <button class="bg-indigo-600 text-white px-4 py-2 rounded hover:bg-indigo-500 cursor-pointer">
      Buy
    </button>
  </div>
</div>
