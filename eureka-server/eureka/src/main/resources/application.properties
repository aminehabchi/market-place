spring.application.name=eureka-server


# Server port
server.port=8761

# Eureka server settings

# Eureka Server itself does not need to register with another Eureka Server
eureka.client.register-with-eureka=false

# Eureka Server does not need to fetch registry information from other servers
eureka.client.fetch-registry=false 

# expose all actuator endpoints for monitoring
management.endpoints.web.exposure.include=*

# show health details always
management.endpoint.health.show-details=always

server.ssl.enabled=true
server.ssl.key-store-password=123123
server.ssl.key-store-type=PKCS12
# Keystore and truststore are mounted into the container at /app/resources/certs
# Use file: paths so Spring loads them from the filesystem (docker-compose mounts)
server.ssl.key-store=classpath:certs/eureka-service.p12
server.ssl.trust-store=classpath:certs/truststore.p12
server.ssl.trust-store-password=123123