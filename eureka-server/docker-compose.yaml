services:
  eureka-server:
    build:
      context: ./eureka
    container_name: eureka-server
    ports:
      - "8761:8761"
    networks:
      - shared-net
    volumes:
      - ./certs/eureka-service.p12:/app/resources/certs/eureka-service.p12:ro
      - ./certs/truststore.p12:/app/resources/certs/truststore.p12:ro

networks:
  shared-net:
    external: true
